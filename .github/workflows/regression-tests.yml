name: Regression Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest anthropic requests python-frontmatter pyyaml
          pip install -r requirements.txt || echo "no/partial requirements.txt"

      - name: Run Regression Tests
        run: |
          # The real suite is pytest under tests/ — the old reference to
          # scripts/regression_test.py was a phantom file (never existed), so
          # CI exited 2 on every commit and caught nothing. PIL-dependent tests
          # self-skip when Pillow is absent.
          python -m pytest tests/ -q

