name: Weekly Refresh Existing Races

# NOTE (2026-07-13): the previous version was an INVALID workflow file —
# `strategy`/`matrix` were placed on a *step* (they are job-level only) and it
# used the `::set-output` command GitHub disabled in 2023. GitHub therefore
# rejected it on EVERY push ("workflow file issue" / "No jobs were run"),
# spamming failed-run emails. Rewritten as a valid two-job matrix.
#
# The weekly `schedule` is intentionally left DISABLED — this job makes live
# Anthropic API calls and pushes to `main`, and it has never actually run.
# Re-enable the cron below once scripts/research.py + synthesize.py are verified.

on:
  # schedule:
  #   - cron: '0 2 * * 1'   # Mondays 02:00 UTC — re-enable after verifying scripts
  workflow_dispatch:

jobs:
  find-races:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      count: ${{ steps.find.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Find races with briefs older than 30 days
        id: find
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime

          races = []
          briefs_dir = "briefs"
          if os.path.exists(briefs_dir):
              for f in os.listdir(briefs_dir):
                  if f.endswith("-brief.md"):
                      age_days = (datetime.now().timestamp()
                                  - os.path.getmtime(os.path.join(briefs_dir, f))) / 86400
                      if age_days > 30:
                          folder = f.replace("-brief.md", "")
                          races.append({
                              "race_name": folder.replace("-", " ").title(),
                              "folder": folder,
                          })

          races = races[:10]  # cap per run
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"matrix={json.dumps({'include': races})}\n")
              out.write(f"count={len(races)}\n")
          print(f"Found {len(races)} races to refresh")
          EOF

  refresh:
    needs: find-races
    if: ${{ needs.find-races.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      max-parallel: 2
      matrix: ${{ fromJson(needs.find-races.outputs.matrix) }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests pyyaml python-frontmatter
      - name: Refresh ${{ matrix.race_name }}
        run: |
          python scripts/research.py \
            --race "${{ matrix.race_name }}" \
            --folder "${{ matrix.folder }}"
          python scripts/synthesize.py \
            --input "research-dumps/${{ matrix.folder }}-raw.md" \
            --output "briefs/${{ matrix.folder }}-brief.md"
          python scripts/generate_json.py \
            --input "briefs/${{ matrix.folder }}-brief.md" \
            --output "landing-pages/${{ matrix.folder }}.json"
      - name: Commit updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Weekly refresh: ${{ matrix.folder }}" || echo "No changes"
          git push || true
